# RAG Manager 配置文件
# 支持 # 注释，修改后需重启服务生效

# 基础路径配置
paths:
  # GGUF 模型存放目录 (绝对路径)
  model_dir: "D:\\oLLM\\alone_models"
  # llama-server 执行文件名或绝对路径
  llama_server: "llama-server.exe"
  # Ollama 的安装目录 (包含 ollama.exe 的文件夹路径)
  ollama_dir: "D:\\oLLM\\ollama"

# Ollama 服务配置
ollama:
  api_url: "http://127.0.0.1:11434"

# Docker 容器路径配置 (用于一键启停 RAGFlow 集群)
docker:
  ragflow_dir: "D:\\Dockers_data\\Docker_RAGFLOW\\ragflow\\docker"
  nginx_pm_dir: "D:\\Dockers_data\\Docker_NginxPM"

# 本地 LLaMA.cpp 服务实例配置
# Key 为服务唯一标识名 (建议与模型名保持一致)
services:

  # 1. 聊天模型
  MISTral:
    model_file: "Mistral-7B-Instruct-v0.3.Q5_K_M.gguf"
    capabilities: ["Completion"]
    port: 1002
    threads: 8
    extra_args: ["-ngl", "99"]  

  Qwen3-4B-Uncensored:
    model_file: "Huihui-Qwen3-4B-abliterated-v2.i1-Q5_K_M.gguf"
    capabilities: ["Completion"]
    port: 1002
    threads: 8
    extra_args: ["-c", "32678", "-n", "10240","-ngl", "99", "--reasoning-budget", "0"]
    
  qwen3.5-4b-uncensored:  
    model_file: "Qwen3.5-4B-Uncensored-HauhauCS-Aggressive-Q4_K_M.gguf"
    capabilities: ["Completion"]
    port: 1002
    threads: 8
    extra_args: ["-c", "32678", "-b", "10240", "-n", "10240", "-ngl", "99"]
  
  Qwen3.5-9B-Uncensored:
    model_file: "Qwen3.5-9B-Uncensored-HauhauCS-Aggressive-Q4_K_M.gguf"
    capabilities: ["Completion"]
    port: 1002
    threads: 8
    extra_args: ["-c", "32678", "-n", "10240", "-ngl", "99", "--reasoning-budget", "0"]
  

  copaw-FLASH:
    model_file: "CoPaw-Flash-2B-Q4_K_M.gguf"
    capabilities: ["Completion"]
    port: 1002
    threads: 8
    extra_args: ["-c", "262144", "-n", "4096", "-ngl", "99"]
 
  qwen2.5-7b:  
#openbuddy-qwen2.5llamaify-7b-v23.1-200k-q4_k_m.gguf
    model_file: "qwen2.5-7b-instruct-q4_k_m.gguf"   
    capabilities: ["Completion"]
    port: 1002
    threads: 8
    extra_args: ["-c", "40960", "-ngl", "99", "--flash-attn", "on", "--repeat-penalty", "1.1"]

  qwen3.5-0.8b:
    model_file: "Qwen.Qwen3.5-0.8B.Q4_K_M.gguf"
    capabilities: ["Completion"]
    port: 1002
    threads: 8
    extra_args: ["-c", "30000", "-b", "2048", "-n", "8192", "-ngl", "99", "--cors" ]


  qwen3.5-9b:
    model_file: "Qwen3.5-9B-Q4_K_M.gguf"
    capabilities: ["Completion"]
    port: 1002
    threads: 8
    extra_args: ["-c", "32768", "-b", "2048", "-n", "8192", "-ngl", "35", "--flash-attn", "on", "--rope-freq-base", "1000000", "--rope-freq-scale", "0.5", "--repeat-penalty", "1.1"]
 
 
 
 
 
 
 
 
 
 
 
 
 
 
 
 
 
 
 
 
 
 
 
 
 
 
 
 
 
 
 
 
 
 
 
 
 
  # 2. Embedding 专用模型
  bge-m3-q4_k_m:
    model_file: "bge-m3-q4_k_m.gguf"
    alias: "bge-m3"
    capabilities: ["Embedding"]
    port: 8088
    threads: 6
    # -b: 逻辑批处理大小（提升吞吐量）；-ub: 物理批处理大小（单次最大 token 上限）
    extra_args: ["--embedding", "-b", "2048", "-ub", "2048", "-ngl", "99"]


  # 3. 方案 A: 综合集成模型 (重排序 + 辅助向量)
  bge-reranker-v2-m3:
    model_file: "bge-reranker-v2-m3-Q4_K_M.gguf"
    alias: "bge-reranker-v2-m3"
    capabilities: ["Embedding", "Rerank"]
    port: 8000
    threads: 4
    # 启用多种功能的启动参数
    extra_args: ["--embedding", "--pooling", "rank", "--reranking", "-ngl", "99"]
